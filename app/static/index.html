<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Voice to GitHub Issue</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 850px;
      margin: 10px auto;
      padding: 10px;
      background: #f7f7f7;
      color: #222;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    button, select, input, textarea {
      font-size: 16px;
      padding: 10px;
      margin-top: 8px;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
      margin-top: 12px;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    button.secondary {
      background: #555;
    }

    textarea {
      min-height: 110px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 14px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .status {
      margin-top: 12px;
      font-weight: bold;
    }

    .result {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      white-space: pre-wrap;
    }

    a {
      color: #0f62fe;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Voice to GitHub Issue</h1>
    <p>
      Select Hebrew or English, click once to start recording, click again to stop.
      The system will automatically transcribe and translate the request into an English GitHub issue.
    </p>

    <div class="row">
      <div>
        <label>Language</label>
        <select id="language">
          <option value="he">Hebrew</option>
          <option value="en">English</option>
        </select>
      </div>

      <div>
        <label>Manual assignee override</label>
        <select id="assignee"></select>
      </div>
    </div>

    <button id="recordButton">Start recording</button>

    <div class="status" id="recordingStatus">Not recording</div>
    <div class="status" id="createStatus"></div>
  </div>

  <div class="card" id="previewCard" style="display:none;">
    <h2>Check before creating</h2>

    <label>What was recorded</label>
    <textarea id="transcriptField" readonly></textarea>

    <label>English issue title</label>
    <input id="titleField" readonly />

    <label>English issue body</label>
    <textarea id="bodyField" readonly></textarea>

    <label>Labels</label>
    <input id="labelsField" readonly />

    <label>Detected assignee</label>
    <input id="detectedAssigneeField" readonly />

    <button id="createButton">Create GitHub Issue</button>
    <button id="recordAgainButton" class="secondary">Record again</button>

    <div class="result" id="resultBox" style="display:none;"></div>
  </div>

<script>
  let mediaRecorder = null;
  let audioChunks = [];
  let recordedBlob = null;
  let currentIssue = null;
  let currentStream = null;
  let isRecording = false;

  const recordButton = document.getElementById("recordButton");
  const createButton = document.getElementById("createButton");
  const recordAgainButton = document.getElementById("recordAgainButton");

  const recordingStatus = document.getElementById("recordingStatus");
  const createStatus = document.getElementById("createStatus");
  const resultBox = document.getElementById("resultBox");

  const languageSelect = document.getElementById("language");
  const assigneeSelect = document.getElementById("assignee");

  const previewCard = document.getElementById("previewCard");
  const transcriptField = document.getElementById("transcriptField");
  const titleField = document.getElementById("titleField");
  const bodyField = document.getElementById("bodyField");
  const labelsField = document.getElementById("labelsField");
  const detectedAssigneeField = document.getElementById("detectedAssigneeField");

  async function loadTeamMembers() {
    try {
      const response = await fetch("/api/team-members");
      const members = await response.json();

      assigneeSelect.innerHTML = "";

      for (const member of members) {
        const option = document.createElement("option");
        option.value = member.github_login;
        option.textContent = member.display_name;
        assigneeSelect.appendChild(option);
      }
    } catch (error) {
      assigneeSelect.innerHTML = '<option value="">Unassigned</option>';
    }
  }

  function resetPreview() {
    currentIssue = null;
    previewCard.style.display = "none";
    resultBox.style.display = "none";
    resultBox.textContent = "";
    transcriptField.value = "";
    titleField.value = "";
    bodyField.value = "";
    labelsField.value = "";
    detectedAssigneeField.value = "";
    createStatus.textContent = "";
  }

  function getSupportedMimeType() {
    const types = [
      "audio/webm;codecs=opus",
      "audio/webm",
      "audio/mp4"
    ];

    for (const type of types) {
      if (MediaRecorder.isTypeSupported(type)) {
        return type;
      }
    }

    return "";
  }

  recordButton.onclick = async () => {
    if (isRecording && mediaRecorder && mediaRecorder.state === "recording") {
      recordButton.disabled = true;
      recordButton.textContent = "Transcribing and translating...";
      recordingStatus.textContent = "Recording stopped.";
      mediaRecorder.stop();
      return;
    }

    await startRecording();
  };

  async function startRecording() {
    audioChunks = [];
    recordedBlob = null;
    resetPreview();

    try {
      currentStream = await navigator.mediaDevices.getUserMedia({ audio: true });

      const mimeType = getSupportedMimeType();
      const options = mimeType ? { mimeType } : {};

      mediaRecorder = new MediaRecorder(currentStream, options);

      mediaRecorder.ondataavailable = event => {
        if (event.data.size > 0) {
          audioChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = async () => {
        const blobType = mediaRecorder.mimeType || "audio/webm";
        recordedBlob = new Blob(audioChunks, { type: blobType });

        if (currentStream) {
          currentStream.getTracks().forEach(track => track.stop());
        }

        isRecording = false;
        recordingStatus.textContent = "Transcribing and translating...";

        await transcribeAndTranslate();
      };

      mediaRecorder.start();

      isRecording = true;
      recordButton.disabled = false;
      recordButton.textContent = "Stop recording";
      recordingStatus.textContent = "Recording. Click again to stop.";

    } catch (error) {
      isRecording = false;
      recordButton.disabled = false;
      recordButton.textContent = "Start recording";
      recordingStatus.textContent = "Microphone access failed.";
      resultBox.style.display = "block";
      resultBox.textContent = error.message;
    }
  }

  async function transcribeAndTranslate() {
    if (!recordedBlob) {
      alert("Record audio first.");
      recordButton.disabled = false;
      recordButton.textContent = "Start recording";
      return;
    }

    recordButton.disabled = true;
    createStatus.textContent = "Transcribing and translating...";
    resetPreview();

    try {
      const formData = new FormData();
      formData.append("audio", recordedBlob, "recording.webm");
      formData.append("language", languageSelect.value);
      formData.append("assignee", assigneeSelect.value);

      const response = await fetch("/api/preview-issue", {
        method: "POST",
        body: formData
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.detail || "Failed to generate issue content.");
      }

      currentIssue = data.issue;

      transcriptField.value = data.transcript || "";
      titleField.value = currentIssue.title || "";
      bodyField.value = currentIssue.body || "";
      labelsField.value = Array.isArray(currentIssue.labels)
        ? currentIssue.labels.join(", ")
        : "";

      detectedAssigneeField.value =
        currentIssue.assignees && currentIssue.assignees.length > 0
          ? currentIssue.assignees[0]
          : "Unassigned";

      previewCard.style.display = "block";
      createStatus.textContent = "Check the text. If it is not correct, record again.";

    } catch (error) {
      createStatus.textContent = "Failed.";
      resultBox.style.display = "block";
      resultBox.textContent = error.message;
    } finally {
      recordButton.disabled = false;
      recordButton.textContent = "Start recording";
    }
  }

  createButton.onclick = async () => {
    if (!currentIssue) {
      alert("Record first.");
      return;
    }

    createButton.disabled = true;
    recordAgainButton.disabled = true;
    createStatus.textContent = "Creating GitHub issue...";
    resultBox.style.display = "none";
    resultBox.textContent = "";

    try {
      const detectedAssignee =
        assigneeSelect.value ||
        (
          currentIssue.assignees && currentIssue.assignees.length > 0
            ? currentIssue.assignees[0]
            : ""
        );

      const formData = new FormData();
      formData.append("title", currentIssue.title);
      formData.append("body", currentIssue.body);
      formData.append("labels", currentIssue.labels.join(","));
      formData.append("assignee", detectedAssignee);

      const response = await fetch("/api/create-issue", {
        method: "POST",
        body: formData
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.detail || "Failed to create GitHub issue.");
      }

      createStatus.textContent = "GitHub issue created.";

      resultBox.style.display = "block";
      resultBox.innerHTML =
        "URL:\n" +
        '<a href="' + data.url + '" target="_blank">' + data.url + "</a>";

    } catch (error) {
      createStatus.textContent = "Failed.";
      resultBox.style.display = "block";
      resultBox.textContent = error.message;
    } finally {
      createButton.disabled = false;
      recordAgainButton.disabled = false;
    }
  };

  recordAgainButton.onclick = () => {
    audioChunks = [];
    recordedBlob = null;
    currentIssue = null;
    resetPreview();
    recordButton.disabled = false;
    recordButton.textContent = "Start recording";
    recordingStatus.textContent = "Not recording. Click Start recording.";
  };

  loadTeamMembers();
</script>
</body>
</html>
